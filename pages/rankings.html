<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings - Who's Better?</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
</head>
<body>
    <div class="background-gradient"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">⚔️</span>
                <span class="logo-text">Who's Better?</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="rankings.html" class="nav-link active">Rankings</a>
                <a href="trending.html" class="nav-link">Trending</a>
                <a href="hall-of-fame.html" class="nav-link">Hall of Fame</a>
                <a href="hall-of-shame.html" class="nav-link">Hall of Shame</a>
                <a href="stats.html" class="nav-link">Stats</a>
                <a href="leaderboard.html" class="nav-link">Leaderboard</a>
                <a href="support.html" class="nav-link" id="supportLink" style="display: none;">Support</a>
                <a href="admin.html" class="nav-link" id="adminLink" style="display: none;">Admin</a>
            </div>
            <div class="auth-section" id="authSection">
                <a href="login.html" class="nav-link auth-link">Login</a>
                <a href="signup.html" class="nav-link auth-link">Sign Up</a>
            </div>
            <div class="profile-card" id="profileCard" style="display: none;">
                <div class="profile-info">
                    <div class="profile-username" id="username">User</div>
                    <div class="profile-level">Level <span id="userLevel">1</span></div>
                    <div class="profile-xp"><span id="userXP">0</span> XP</div>
                </div>
                <div class="profile-streak">
                    <span class="streak-icon">🔥</span>
                    <span id="userStreak">0</span> Day Streak
                </div>
                <button class="logout-button" id="logoutButton">Logout</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="hero-title">Rankings</h1>
        <p class="hero-subtitle">See how the community voted</p>
        
        <div class="rankings-controls">
            <input type="text" class="search-box" id="searchBox" placeholder="Search items...">
            <div class="filter-buttons" id="filterButtons">
                <button class="filter-button active" data-filter="all">All</button>
                <button class="filter-button" data-filter="Gaming">Gaming</button>
                <button class="filter-button" data-filter="Movies">Movies</button>
                <button class="filter-button" data-filter="Food">Food</button>
                <button class="filter-button" data-filter="Cars">Cars</button>
                <button class="filter-button" data-filter="Technology">Technology</button>
                <button class="filter-button" data-filter="Sports">Sports</button>
                <button class="filter-button" data-filter="Music">Music</button>
                <button class="filter-button" data-filter="Random">Random</button>
            </div>
        </div>
        
        <div class="rankings-table-container">
            <table id="rankingsTable">
                <thead>
                    <tr>
                        <th data-sort="rank">Rank</th>
                        <th data-sort="name">Name</th>
                        <th data-sort="winRate">Win Rate</th>
                        <th data-sort="wins">Wins</th>
                        <th data-sort="losses">Losses</th>
                        <th data-sort="category">Category</th>
                    </tr>
                </thead>
                <tbody id="rankingsBody">
                </tbody>
            </table>
        </div>
    </main>

    <script src="../js/rankings.js"></script>
</body>
</html>
